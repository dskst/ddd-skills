---
name: value-object-eval
description: value-object スキルが Value Object の特定・設計を支援できるかを検証する評価スイート。
skill: value-object
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.6

metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.8
    description: スキルが依頼されたタスクを完了できたか

graders:
  - type: code
    name: has_substantial_output
    config:
      assertions:
        - "len(output) > 200"

tasks:
  - "tasks/*.yaml"
